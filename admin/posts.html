<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Posts · Medifluencer Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-shell">
  <main class="admin-main">
    <header class="admin-head">
      <div>
        <h1>Posts</h1>
        <p>블로그 / 소식 글을 발행하고 관리합니다.</p>
      </div>
      <div class="actions">
        <button class="btn-sec" id="refreshBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          새로고침
        </button>
        <a href="/admin/post-edit.html" class="btn-pri">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          새 글 작성
        </a>
      </div>
    </header>

    <div class="stat-grid">
      <div class="stat-card stat-card-accent"><div class="stat-label">전체</div><div class="stat-val" id="stTotal">0</div></div>
      <div class="stat-card"><div class="stat-label">Published</div><div class="stat-val" id="stPublished">0</div><div class="stat-sub">발행 완료</div></div>
      <div class="stat-card"><div class="stat-label">Drafts</div><div class="stat-val" id="stDrafts">0</div><div class="stat-sub">발행 대기 중</div></div>
      <div class="stat-card"><div class="stat-label">Scheduled</div><div class="stat-val" id="stScheduled">0</div><div class="stat-sub">예약 발행</div></div>
      <div class="stat-card"><div class="stat-label">Archived</div><div class="stat-val" id="stArchived">0</div><div class="stat-sub">보관됨</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
        <input type="text" id="searchInput" placeholder="제목·슬러그·요약 검색…">
      </div>
      <div class="toolbar-filter" id="statusFilter">
        <button class="chip active" data-status="">전체</button>
        <button class="chip" data-status="published">Published</button>
        <button class="chip" data-status="draft">Drafts</button>
        <button class="chip" data-status="archived">Archived</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:40%">제목</th>
          <th style="width:12%">태그</th>
          <th style="width:14%">상태</th>
          <th style="width:18%">발행일</th>
          <th style="width:16%">관리</th>
        </tr></thead>
        <tbody id="postRows"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="../assets/supabase.js"></script>
<script src="admin.js"></script>
<script>
MFAdmin.attachShell('posts');

const tbody = document.getElementById('postRows');
const searchInput = document.getElementById('searchInput');
const statusFilter = document.getElementById('statusFilter');

let allRows = [];
let activeStatus = '';
let activeQuery = '';

function showSkeleton(){ tbody.innerHTML = MFAdmin.skeletonRows(5, 5); }

async function load() {
  showSkeleton();
  try {
    const rows = await SB.sbSelect('blog_posts', '?select=*&order=created_at.desc&limit=500');
    allRows = rows || [];
    updateStats();
    render();
  } catch (e) {
    console.error(e);
    tbody.innerHTML = `<tr><td colspan="5" class="empty"><strong>불러오기 실패</strong>${MFAdmin.escape(e.message)}</td></tr>`;
  }
}

function updateStats() {
  const now = new Date();
  let published = 0, scheduled = 0, drafts = 0, archived = 0;
  allRows.forEach(r => {
    if (r.status === 'archived') { archived++; return; }
    if (r.status === 'draft') { drafts++; return; }
    if (r.status === 'published') {
      if (r.published_at && new Date(r.published_at) > now) scheduled++;
      else published++;
    }
  });
  document.getElementById('stTotal').textContent = allRows.length;
  document.getElementById('stPublished').textContent = published;
  document.getElementById('stDrafts').textContent = drafts;
  document.getElementById('stScheduled').textContent = scheduled;
  document.getElementById('stArchived').textContent = archived;
}

function render() {
  const filtered = MFAdmin.filterRows(allRows, {
    search: activeQuery,
    fields: ['title_ko','title_en','slug','excerpt_ko'],
    status: activeStatus || null,
  });

  if (!filtered.length) {
    tbody.innerHTML = allRows.length === 0
      ? `<tr><td colspan="5" class="empty"><strong>아직 글이 없습니다</strong><a class="btn-link" href="/admin/post-edit.html">첫 글을 작성하세요 →</a></td></tr>`
      : `<tr><td colspan="5" class="empty"><strong>조건에 맞는 글이 없습니다</strong>검색어나 필터를 조정해보세요.</td></tr>`;
    return;
  }

  const now = new Date();
  tbody.innerHTML = filtered.map(r => {
    const isScheduled = r.status === 'published' && r.published_at && new Date(r.published_at) > now;
    const statusDisplay = isScheduled ? '<span class="cell-status reviewing" title="예약 발행">scheduled</span>' : `<span class="cell-status ${r.status}">${r.status}</span>`;
    return `
    <tr data-id="${r.id}">
      <td>
        <div class="cell-name">${MFAdmin.escape(r.title_ko)}</div>
        <div class="cell-meta">/${MFAdmin.escape(r.slug)}</div>
      </td>
      <td><span class="cell-tag">${MFAdmin.escape(r.tag || 'medical')}</span></td>
      <td>${statusDisplay}</td>
      <td style="font-size:12.5px;color:#64748B" title="${r.published_at ? MFAdmin.fmtDate(r.published_at) : '—'}">${r.published_at ? MFAdmin.fmtDateShort(r.published_at) : '—'}</td>
      <td>
        <a class="btn-link" href="/admin/post-edit.html?id=${r.id}">편집</a>
        ${r.status === 'published' && !isScheduled ? `<a class="btn-link" target="_blank" rel="noopener" href="/blog-post.html?slug=${encodeURIComponent(r.slug)}" style="margin-left:10px">미리보기 ↗</a>` : ''}
      </td>
    </tr>`;
  }).join('');

  // Row click → edit
  tbody.querySelectorAll('tr[data-id]').forEach(tr => {
    tr.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') return;
      location.href = `/admin/post-edit.html?id=${tr.dataset.id}`;
    });
  });
}

// Search (debounced)
let searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { activeQuery = searchInput.value; render(); }, 150);
});

// Filter chips
statusFilter.addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  statusFilter.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeStatus = chip.dataset.status;
  render();
});

document.getElementById('refreshBtn').onclick = load;
load();
</script>
</body>
</html>
