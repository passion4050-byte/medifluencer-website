<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Inbox · Medifluencer Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-shell">
  <main class="admin-main">
    <header class="admin-head">
      <div>
        <h1>Inbox</h1>
        <p>웹사이트 Contact 폼에서 들어온 문의 목록입니다.</p>
      </div>
      <div class="actions">
        <button class="btn-sec" id="refreshBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          새로고침
        </button>
      </div>
    </header>

    <div class="stat-grid" id="stats">
      <div class="stat-card stat-card-accent"><div class="stat-label">전체</div><div class="stat-val" id="stTotal">0</div></div>
      <div class="stat-card"><div class="stat-label">New</div><div class="stat-val" id="stNew">0</div><div class="stat-sub">아직 확인 안 함</div></div>
      <div class="stat-card"><div class="stat-label">Reviewing</div><div class="stat-val" id="stReviewing">0</div><div class="stat-sub">검토 중</div></div>
      <div class="stat-card"><div class="stat-label">Replied</div><div class="stat-val" id="stReplied">0</div><div class="stat-sub">회신 완료</div></div>
      <div class="stat-card"><div class="stat-label">Closed</div><div class="stat-val" id="stClosed">0</div><div class="stat-sub">처리 종결</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/></svg>
        <input type="text" id="searchInput" placeholder="기관·담당자·이메일·메시지 검색…">
      </div>
      <div class="toolbar-filter" id="statusFilter">
        <button class="chip active" data-status="">전체 <span class="chip-count" id="cAll">0</span></button>
        <button class="chip" data-status="new">New <span class="chip-count" id="cNew">0</span></button>
        <button class="chip" data-status="reviewing">Reviewing <span class="chip-count" id="cReviewing">0</span></button>
        <button class="chip" data-status="replied">Replied <span class="chip-count" id="cReplied">0</span></button>
        <button class="chip" data-status="closed">Closed <span class="chip-count" id="cClosed">0</span></button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr>
          <th style="width:22%">기관 / 담당자</th>
          <th style="width:14%">관심 영역</th>
          <th>메시지</th>
          <th style="width:14%">받은 일시</th>
          <th style="width:10%">상태</th>
        </tr></thead>
        <tbody id="inquiryRows"></tbody>
      </table>
    </div>
  </main>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-panel" id="drawerPanel"></div>
</div>

<script src="../assets/supabase.js"></script>
<script src="admin.js"></script>
<script>
MFAdmin.attachShell('inbox');

const tbody = document.getElementById('inquiryRows');
const drawer = document.getElementById('drawer');
const panel = document.getElementById('drawerPanel');
const searchInput = document.getElementById('searchInput');
const statusFilter = document.getElementById('statusFilter');

let allRows = [];
let activeStatus = '';
let activeQuery = '';

function showSkeleton(){ tbody.innerHTML = MFAdmin.skeletonRows(5, 6); }

async function load() {
  showSkeleton();
  try {
    const rows = await SB.sbSelect('inquiries', '?select=*&order=created_at.desc&limit=500');
    allRows = rows || [];
    updateStats();
    render();
  } catch (e) {
    console.error(e);
    tbody.innerHTML = `<tr><td colspan="5" class="empty"><strong>불러오기 실패</strong>${MFAdmin.escape(e.message)}</td></tr>`;
  }
}

function updateStats() {
  const counts = { new:0, reviewing:0, replied:0, closed:0 };
  allRows.forEach(r => { if (counts[r.status] !== undefined) counts[r.status]++; });
  const total = allRows.length;
  document.getElementById('stTotal').textContent = total;
  document.getElementById('stNew').textContent = counts.new;
  document.getElementById('stReviewing').textContent = counts.reviewing;
  document.getElementById('stReplied').textContent = counts.replied;
  document.getElementById('stClosed').textContent = counts.closed;
  document.getElementById('cAll').textContent = total;
  document.getElementById('cNew').textContent = counts.new;
  document.getElementById('cReviewing').textContent = counts.reviewing;
  document.getElementById('cReplied').textContent = counts.replied;
  document.getElementById('cClosed').textContent = counts.closed;
  const badge = document.getElementById('inboxBadge');
  if (counts.new > 0) { badge.style.display = 'inline-block'; badge.textContent = counts.new; }
  else badge.style.display = 'none';
}

function render() {
  const filtered = MFAdmin.filterRows(allRows, {
    search: activeQuery,
    fields: ['name','org','email','message','topic'],
    status: activeStatus || null,
  });

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="empty"><strong>${allRows.length === 0 ? '아직 문의가 없습니다' : '조건에 맞는 문의가 없습니다'}</strong>${allRows.length === 0 ? 'Contact 폼이 작동하면 여기에 표시됩니다.' : '검색어나 필터를 조정해보세요.'}</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(r => `
    <tr data-id="${r.id}">
      <td>
        <div class="cell-name">${MFAdmin.escape(r.org || r.name)}</div>
        <div class="cell-meta">${MFAdmin.escape(r.name)} · ${MFAdmin.escape(r.email)}</div>
      </td>
      <td><span class="cell-tag">${MFAdmin.escape(r.topic || 'general')}</span></td>
      <td style="color:#475569;line-height:1.55">${MFAdmin.escape((r.message || '').slice(0, 100))}${(r.message || '').length > 100 ? '…' : ''}</td>
      <td style="font-size:12.5px;color:#64748B" title="${MFAdmin.fmtDate(r.created_at)}">${MFAdmin.fmtRelative(r.created_at)}</td>
      <td><span class="cell-status ${r.status}">${r.status}</span></td>
    </tr>`).join('');
  tbody.querySelectorAll('tr[data-id]').forEach(tr => {
    tr.addEventListener('click', () => openDrawer(tr.dataset.id));
  });
}

function openDrawer(id) {
  const r = allRows.find(x => x.id === id);
  if (!r) return;
  panel.innerHTML = `
    <h2>${MFAdmin.escape(r.org || r.name)}</h2>
    <p style="color:#64748B;font-size:13px;margin-bottom:6px">${MFAdmin.escape(r.name)} · <a href="mailto:${MFAdmin.escape(r.email)}">${MFAdmin.escape(r.email)}</a></p>
    <p style="font-size:12px;color:#94A3B8" title="${MFAdmin.fmtDate(r.created_at)}">${MFAdmin.fmtDate(r.created_at)} (${MFAdmin.fmtRelative(r.created_at)})</p>

    <div class="field"><label>관심 영역</label><div class="val">${MFAdmin.escape(r.topic || '—')}</div></div>
    ${r.phone ? `<div class="field"><label>연락처</label><div class="val">${MFAdmin.escape(r.phone)}</div></div>` : ''}
    <div class="field"><label>메시지</label><div class="val">${MFAdmin.escape(r.message || '')}</div></div>

    <div class="field"><label>관리자 메모</label>
      <textarea id="noteText" placeholder="내부용 메모 — 외부에 노출되지 않습니다.">${MFAdmin.escape(r.admin_note || '')}</textarea>
    </div>

    <div class="controls">
      <select id="statusSel" aria-label="상태 변경">
        <option value="new" ${r.status==='new'?'selected':''}>new</option>
        <option value="reviewing" ${r.status==='reviewing'?'selected':''}>reviewing</option>
        <option value="replied" ${r.status==='replied'?'selected':''}>replied</option>
        <option value="closed" ${r.status==='closed'?'selected':''}>closed</option>
      </select>
      <button class="btn-pri" id="saveBtn">저장</button>
      <a class="btn-sec" href="mailto:${MFAdmin.escape(r.email)}?subject=${encodeURIComponent('[메디플루언서] 회신 — ' + (r.org || r.name))}&body=${encodeURIComponent('안녕하세요 ' + (r.name) + '님,\n\n메디플루언서 입니다. 보내주신 문의 잘 받았습니다.\n\n')}">메일로 회신</a>
      <button class="btn-danger" id="delBtn">삭제</button>
      <button class="btn-link" style="margin-left:auto" id="closeBtn">닫기</button>
    </div>`;
  drawer.classList.add('open');

  document.getElementById('closeBtn').onclick = () => drawer.classList.remove('open');
  document.getElementById('saveBtn').onclick = async () => {
    const newStatus = document.getElementById('statusSel').value;
    const newNote = document.getElementById('noteText').value;
    try {
      await SB.sbUpdate('inquiries', `id=eq.${id}`, { status: newStatus, admin_note: newNote });
      MFAdmin.toast('저장됨');
      drawer.classList.remove('open');
      load();
    } catch (e) { MFAdmin.toast('저장 실패: ' + e.message, {error:true}); }
  };
  document.getElementById('delBtn').onclick = async () => {
    if (!confirm('이 문의를 삭제하시겠습니까? 복구할 수 없습니다.')) return;
    try {
      await SB.sbDelete('inquiries', `id=eq.${id}`);
      MFAdmin.toast('삭제됨');
      drawer.classList.remove('open');
      load();
    } catch (e) { MFAdmin.toast('삭제 실패: ' + e.message, {error:true}); }
  };
}

// Search input (debounced)
let searchTimer = null;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { activeQuery = searchInput.value; render(); }, 150);
});

// Filter chips
statusFilter.addEventListener('click', (e) => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  statusFilter.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeStatus = chip.dataset.status;
  render();
});

// Drawer close on backdrop
drawer.addEventListener('click', (e) => { if (e.target === drawer) drawer.classList.remove('open'); });
// Escape to close drawer
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && drawer.classList.contains('open')) drawer.classList.remove('open'); });

document.getElementById('refreshBtn').onclick = load;
load();
</script>
</body>
</html>
