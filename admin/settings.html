<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Settings · Medifluencer Admin</title>
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-shell">
  <main class="admin-main">
    <header class="admin-head">
      <div>
        <h1>Settings</h1>
        <p>계정 설정과 비밀번호 변경.</p>
      </div>
    </header>

    <div class="editor" style="grid-template-columns:1fr">
      <section class="editor-main" style="max-width:560px">
        <h2 style="font-family:'Instrument Serif',serif;font-style:italic;font-size:22px;color:#0A2540;margin-bottom:22px;letter-spacing:-0.01em">비밀번호 변경</h2>

        <div class="editor-field">
          <label>새 비밀번호</label>
          <input type="password" id="newPw" autocomplete="new-password">
        </div>
        <div class="editor-field">
          <label>새 비밀번호 확인</label>
          <input type="password" id="newPw2" autocomplete="new-password">
        </div>

        <button class="btn-pri" id="changeBtn">비밀번호 변경</button>

        <div style="margin-top:32px;padding-top:24px;border-top:1px solid #E2E8F0">
          <h6 style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#475569;margin-bottom:10px;font-weight:600">계정 정보</h6>
          <p style="font-size:13.5px;color:#475569" id="acctInfo">—</p>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="../assets/supabase.js"></script>
<script src="admin.js"></script>
<script>
MFAdmin.attachShell('settings');

document.getElementById('acctInfo').textContent = 'Email: ' + MFAdmin.userEmail();

document.getElementById('changeBtn').onclick = async () => {
  const pw = document.getElementById('newPw').value;
  const pw2 = document.getElementById('newPw2').value;
  if (!pw || pw.length < 8) { alert('비밀번호는 최소 8자 이상이어야 합니다'); return; }
  if (pw !== pw2) { alert('비밀번호가 일치하지 않습니다'); return; }
  try {
    await SB.sbAuth.updateUser({ password: pw });
    MFAdmin.toast('비밀번호가 변경되었습니다');
    document.getElementById('newPw').value = '';
    document.getElementById('newPw2').value = '';
  } catch (e) {
    alert('변경 실패: ' + e.message);
  }
};
</script>
</body>
</html>
